[phases.setup]
nixPkgs = ["python311", "postgresql"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "python manage.py collectstatic --no-input"
]
[start]
cmd = "python manage.py makemigrations && python manage.py migrate --no-input && gunicorn carmarket.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
